name: Release APK

# Cut a release by pushing a tag like v1.0:  git tag v1.0 && git push origin v1.0
# (or run manually from the Actions tab). Requires these repo secrets:
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > eunchoy-release.keystore

      - name: Create keystore.properties
        run: |
          {
            echo "storeFile=eunchoy-release.keystore"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } > keystore.properties

      - name: Build signed release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk eunchoy-moaboki-${{ github.ref_name }}.apk

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: eunchoy-moaboki-${{ github.ref_name }}.apk
          generate_release_notes: true
